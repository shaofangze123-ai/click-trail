<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .row:last-child { border-bottom: none; }
    .label { font-size: 13px; color: #aaa; }
    .value { font-size: 13px; color: #fff; font-weight: 500; }

    /* 开关 */
    .switch {
      position: relative;
      width: 40px; height: 22px;
      cursor: pointer;
    }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0;
      background: #333;
      border-radius: 11px;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .switch input:checked + .slider { background: #4d7cff; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* 数量选择 */
    .num-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .num-btn {
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .num-btn:hover { background: rgba(77,124,255,0.3); }
    #max-display {
      min-width: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #4d7cff;
    }

    /* 清除按钮 */
    /* 颜色选择 */
    .color-options {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .color-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: #fff; }
    .color-custom-wrap {
      position: relative;
      width: 22px; height: 22px;
    }
    .color-custom-wrap input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      padding: 0; border: none;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
    }
    .color-custom-label {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #888;
      pointer-events: none;
    }
    .color-custom-wrap.active .color-custom-label {
      border-style: solid;
      border-color: #fff;
    }

    /* 清除按钮 */
    .clear-btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,77,77,0.3);
      background: rgba(255,77,77,0.08);
      color: #ff6b6b;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255,77,77,0.2); }

    .status {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="icon" />
    <h1>Click Trail</h1>
  </div>

  <div class="row">
    <span class="label">启用追踪</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span class="label">保留标记数</span>
    <div class="num-control">
      <button class="num-btn" id="dec">−</button>
      <span id="max-display">5</span>
      <button class="num-btn" id="inc">+</button>
    </div>
  </div>

  <div class="row">
    <span class="label">光点颜色</span>
    <div class="color-options">
      <div class="color-dot active" data-color="255,105,180" style="background:rgb(255,105,180);box-shadow:0 0 6px rgba(255,105,180,0.5)"></div>
      <div class="color-dot" data-color="255,190,60" style="background:rgb(255,190,60);box-shadow:0 0 6px rgba(255,190,60,0.5)"></div>
      <div class="color-dot" data-color="77,200,255" style="background:rgb(77,200,255);box-shadow:0 0 6px rgba(77,200,255,0.5)"></div>
      <div class="color-dot" data-color="120,255,120" style="background:rgb(120,255,120);box-shadow:0 0 6px rgba(120,255,120,0.5)"></div>
      <div class="color-dot" data-color="180,130,255" style="background:rgb(180,130,255);box-shadow:0 0 6px rgba(180,130,255,0.5)"></div>
      <div class="color-custom-wrap" id="custom-wrap">
        <div class="color-custom-label">+</div>
        <input type="color" id="custom-color" value="#ff69b4" />
      </div>
    </div>
  </div>

  <div class="row">
    <span class="label">当前页标记</span>
    <span class="value" id="count">0</span>
  </div>

  <button class="clear-btn" id="clear">清除当前页标记</button>
  <div class="status">点击页面元素留下轨迹标记</div>

  <script src="popup.js"></script>
</body>
</html>
